services:
  whatsapp-server:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp
    container_name: voxx-zero-whatsapp
    env_file:
      - .env.whatsapp
    environment:
      SANDBOX_PORT: "4200"
      WA_AUTH_ROOT: /data/baileys
      WA_LOG_LEVEL: ${WA_LOG_LEVEL:-silent}
      OLLAMA_BASE_URL: http://127.0.0.1:11434
    network_mode: "host"
    volumes:
      - whatsapp_auth:/data/baileys
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4200/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  whatsapp_auth:
